name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate content
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare artifact directory
        run: |
          mkdir -p "$RUNNER_TEMP/site"
          cp index.html styles.css script.js robots.txt sitemap.xml CNAME .nojekyll "$RUNNER_TEMP/site/"
          cp -R privacy terms help .well-known "$RUNNER_TEMP/site/"
          for directory in assets; do
            if [ -d "$directory" ]; then
              cp -R "$directory" "$RUNNER_TEMP/site/"
            fi
          done

      - name: Archive artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory "$RUNNER_TEMP/site" \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
